# BuildPro Docker Compose -- PRODUCTION
#
# Usage:
#   cp .env.example .env  # fill in production values
#   docker compose -f deploy/docker-compose.prod.yml up -d
#   docker compose -f deploy/docker-compose.prod.yml exec web python manage.py migrate
#   docker compose -f deploy/docker-compose.prod.yml exec web python manage.py createsuperuser
#
# Required .env values:
#   DJANGO_SECRET_KEY, POSTGRES_PASSWORD, GEMINI_API_KEY,
#   ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buildpro}
      POSTGRES_USER: ${POSTGRES_USER:-buildpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buildpro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Gunicorn is the default CMD in Dockerfile
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: buildpro.settings.production
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A buildpro worker -l warning -c 2
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: buildpro.settings.production
      POSTGRES_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Nginx serves built SPA on port 80 inside container

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - static_data:/srv/static:ro
      - media_data:/srv/media:ro
    depends_on:
      - web
      - frontend

volumes:
  postgres_data:
  media_data:
  static_data:
  caddy_data:
  caddy_config:

function runCPM(tasks){
// CPM implementation per Kelley & Walker (1959), PMI PMBOK 7th ed.
// Phase 1: Clone tasks, build adjacency structures
var t=tasks.map(function(tk){return Object.assign({},tk,{es:0,ef:0,ls:0,lf:0,slack:0,critical:false})});
if(t.length===0)return{tasks:t,duration:0};
var map={};t.forEach(function(tk){map[tk.id]=tk});
// Phase 2: Topological sort (Kahn's algorithm - handles cycles gracefully)
var inDeg={};var succ={};
t.forEach(function(tk){inDeg[tk.id]=0;succ[tk.id]=[]});
t.forEach(function(tk){tk.pred.forEach(function(p){if(map[p]){inDeg[tk.id]++;if(succ[p])succ[p].push(tk.id)}})});
var queue=[];t.forEach(function(tk){if(inDeg[tk.id]===0)queue.push(tk.id)});
var order=[];
while(queue.length>0){var nid=queue.shift();order.push(nid);(succ[nid]||[]).forEach(function(s){inDeg[s]--;if(inDeg[s]===0)queue.push(s)})}
// If cycle detected, add remaining nodes
t.forEach(function(tk){if(order.indexOf(tk.id)===-1)order.push(tk.id)});
// Phase 3: Forward pass - compute ES and EF
// ES(i) = max{EF(j)} for all predecessors j; ES = 0 if no predecessors
// EF(i) = ES(i) + Duration(i)
order.forEach(function(id){var tk=map[id];if(!tk)return;
var validPreds=tk.pred.filter(function(p){return map[p]});
tk.es=validPreds.length>0?Math.max.apply(null,validPreds.map(function(p){return map[p].ef})):0;
tk.ef=tk.es+tk.dur});
// Phase 4: Project duration = max EF across all tasks
var projDur=t.length>0?Math.max.apply(null,t.map(function(tk){return tk.ef})):0;
if(projDur===0)projDur=1;
// Phase 5: Backward pass - compute LF and LS
// LF(i) = min{LS(j)} for all successors j; LF = projectDuration if no successors
// LS(i) = LF(i) - Duration(i)
order.slice().reverse().forEach(function(id){var tk=map[id];if(!tk)return;
var sArr=succ[id]||[];
tk.lf=sArr.length>0?Math.min.apply(null,sArr.map(function(s){return map[s]?map[s].ls:projDur})):projDur;
tk.ls=tk.lf-tk.dur;
// Phase 6: Total float (slack) and critical path identification
// Float = LS - ES = LF - EF
tk.slack=tk.ls-tk.es;
tk.critical=(tk.slack===0)});
return{tasks:t,duration:projDur}}

var MODULE_INFO={
"Milestones":"Track key project milestones (e.g. Foundation Complete, Roof On, Handover). Link milestones to specific tasks and mark them as Pending, Achieved, or Missed. Milestones appear as diamond markers on the Gantt chart.",
"S-Curve":"Visualise planned vs actual cumulative expenditure over the project timeline. The blue line shows planned spending based on task schedules and budgets. The orange dashed line shows actual spending from logged expenses. Use this to monitor cash flow and identify cost overruns early.",
"Risk Register":"Identify, assess, and track project risks. Each risk has a probability and impact rating (Low to Critical), an owner responsible for managing it, and a mitigation plan. Update status as risks are mitigated or closed.",
"RFIs":"Request for Information (RFI) management. Track questions from site teams to consultants/designers. Each RFI has a subject, sender, recipient, due date, and response. Common in FIDIC and NEC contract workflows.",
"Change Orders":"Track scope changes and variations. Record cost and time impacts, then approve or reject. The summary shows total approved cost and time impacts across all variations. Essential for distinguishing original scope from extras.",
"Punch List":"Track deficiencies found during inspections and handover. Add items with location, priority, and assignee. Check off items as they are resolved. Filter by status to see outstanding snags.",
"Daily Logs":"Record daily site conditions: weather, worker headcount, equipment on site, work accomplished, visitors, and any incidents. This forms the legal site diary record required on construction projects.",
"Safety":"Report and track safety incidents and near-misses. Record type, severity, description, and corrective actions taken. Keeping good safety records helps identify patterns and prevent future incidents.",
"Quality":"Record quality inspection results at key hold points. Track pass/fail/conditional outcomes with inspector name and notes (e.g. concrete cube test results). Maintains the QA/QC paper trail.",
"Site Photos":"Maintain a log of time-stamped site photos with captions, locations, and linked tasks. Useful for progress evidence, client reports, and dispute resolution.",
"Procurement":"Track purchase orders from creation to delivery. Monitor supplier performance, delivery status, and total procurement costs. Helps prevent material shortages that delay the programme.",
"Timesheets":"Log worker hours per task per day. Track total hours and labour allocation across the project. Useful for payroll, productivity analysis, and cost control.",
"Resources":"Manage the project resource pool: workers, teams, and equipment. Set daily rates and toggle availability. Helps identify over-allocation and plan resource needs.",
"Meetings":"Record meeting minutes with attendees, key decisions, and action items. Track action item completion with checkboxes. Maintains the formal communication record.",
"Notifications":"Auto-scans all projects for issues: delayed tasks, critical tasks below 100%, budget overruns above 90%, open RFIs, and high-severity open risks. Click any alert to jump to that project.",
"Documents":"Store and manage project documents: drawings, contracts, permits, reports, and photos. Filter by category, download files, and upload new documents.",
"Schedule":"View and edit the project schedule using Critical Path Method (CPM). Edit task durations, dates, predecessors, and track ES/EF/LS/LF/Slack values. Changes sync with Gantt chart and Cost module.",
"Cost":"Track project costs against budget. View Budget vs Actual spending per task, manage expenses with receipt attachments, and monitor variance. Changes sync with Schedule and Gantt.",
"Gantt":"Interactive Gantt chart showing tasks as bars on a timeline. Zoom between Days/Weeks/Months/Years. Click tasks to Edit, Add Sibling/Child tasks, or Remove. Dependency arrows and milestone diamonds shown.",
"Network":"Activity-on-Node (AON) network diagram showing task dependencies and critical path. Each node displays ES, Duration, EF, LS, Slack, LF values.",
"Overview":"Project dashboard showing KPIs, progress, cost summary, EVM metrics (CPI, SPI, EAC, VAC), critical path, client details, and milestone status.",
"Reports":"Downloadable reports for all project modules. Each report can be exported as CSV, Excel, Word, or PDF. Visual reports (Gantt, Network, S-Curve) export as SVG.",
"Punch":"Track deficiencies and snag items found during inspections. Set status (Pending, In Progress, Completed), priority, location, assignee. Attach photos and documents as evidence.",
"Recycle Bin":"Recover deleted items from all modules. Each deleted item shows who deleted it, when, and why. Items can be restored to their original module or permanently deleted.","Chat":"Project-specific team chat for discussions, decisions, and coordination. Messages are timestamped and attributed to team members.",
"Daily Site":"Record daily site conditions: weather, worker headcount, equipment on site, work accomplished, visitors, and any incidents. This forms the legal site diary record required on construction projects.",
"Resource Pool":"Manage the project resource pool: workers, teams, and equipment. Set daily rates and toggle availability. Helps identify over-allocation and plan resource needs.",
"Meeting Minutes":"Record meeting minutes with attendees, key decisions, and action items. Track action item completion with checkboxes. Maintains the formal communication record."
};

# BuildPro Render Blueprint
#
# Architecture:
#   - Web: Django + Gunicorn + WhiteNoise (API + SPA, same-origin)
#   - Worker: Celery for async AI + background jobs
#   - Key Value: Redis-compatible broker for Celery
#   - Database: External Neon PostgreSQL (not provisioned here)
#   - Files: Cloudflare R2 (configured via AWS_* env vars)
#
# Prerequisites:
#   1. Create a Neon PostgreSQL database
#   2. Create a Cloudflare R2 bucket (or set REQUIRE_REMOTE_STORAGE=false initially)
#   3. Set all manual env vars in Render dashboard on buildpro-web
#   4. Worker sources secrets from web service automatically

services:
  # --- Web service (Django + frontend SPA, same-origin) ---
  - type: web
    name: buildpro-web
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health/
    buildFilter:
      paths:
        - backend/**
        - frontend/**
        - Dockerfile.render
    # preDeployCommand runs from image filesystem, not repo root
    preDeployCommand: "python /app/backend/manage.py migrate --noinput"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: buildpro.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: REQUIRE_DATABASE_URL
        value: "true"
      - key: REQUIRE_REMOTE_STORAGE
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CELERY_BROKER_URL
        fromService:
          name: buildpro-kv
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: buildpro-kv
          type: keyvalue
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.0-flash
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false

  # --- Background worker (Celery) ---
  # Secrets sourced from buildpro-web to avoid manual duplication.
  - type: worker
    name: buildpro-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: starter
    buildFilter:
      paths:
        - backend/**
        - Dockerfile.render
    # No shell builtins -- use --workdir flag instead of cd
    dockerCommand: "celery --workdir /app/backend -A buildpro worker -l warning -c 2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: buildpro.settings.production
      - key: REQUIRE_DATABASE_URL
        value: "true"
      - key: REQUIRE_REMOTE_STORAGE
        value: "false"
      # Shared secrets sourced from web service
      - key: DJANGO_SECRET_KEY
        fromService:
          name: buildpro-web
          type: web
          envVarKey: DJANGO_SECRET_KEY
      - key: DATABASE_URL
        fromService:
          name: buildpro-web
          type: web
          envVarKey: DATABASE_URL
      - key: GEMINI_API_KEY
        fromService:
          name: buildpro-web
          type: web
          envVarKey: GEMINI_API_KEY
      - key: AWS_S3_ENDPOINT_URL
        fromService:
          name: buildpro-web
          type: web
          envVarKey: AWS_S3_ENDPOINT_URL
      - key: AWS_ACCESS_KEY_ID
        fromService:
          name: buildpro-web
          type: web
          envVarKey: AWS_ACCESS_KEY_ID
      - key: AWS_SECRET_ACCESS_KEY
        fromService:
          name: buildpro-web
          type: web
          envVarKey: AWS_SECRET_ACCESS_KEY
      - key: AWS_STORAGE_BUCKET_NAME
        fromService:
          name: buildpro-web
          type: web
          envVarKey: AWS_STORAGE_BUCKET_NAME
      # Broker from Key Value
      - key: CELERY_BROKER_URL
        fromService:
          name: buildpro-kv
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: buildpro-kv
          type: keyvalue
          property: connectionString
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.0-flash

  # --- Render Key Value (Redis-compatible broker) ---
  - type: keyvalue
    name: buildpro-kv
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []
